<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Arabic.ai — CEO Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body{font-family:system-ui,sans-serif;margin:0}
    @media print{.no-print{display:none!important}body{font-size:11px}}
  </style>
</head>
<body class="bg-white">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const PRP='#6B21A8';
const STATUSES=['On Track','At Risk','In Progress','Done','Overdue','Stalled','Delayed','Not Started'];
const STAGES=['Prospecting','Qualifying','Proposal','Negotiation','Committed'];
const sc=s=>({'On Track':'bg-green-100 text-green-800','Done':'bg-green-100 text-green-800','At Risk':'bg-amber-100 text-amber-800','Stalled':'bg-red-100 text-red-800','Overdue':'bg-red-100 text-red-800','Delayed':'bg-red-100 text-red-800','In Progress':'bg-blue-100 text-blue-800','Not Started':'bg-gray-100 text-gray-500'}[s]||'bg-gray-100 text-gray-500');
const ts=()=>new Date().toLocaleString('en-GB',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const iCls="border border-gray-200 rounded px-2 py-1 text-sm w-full focus:outline-none focus:ring-1 focus:ring-purple-600";
const mkArr=(n,d)=>Array.from({length:n},()=>({...d}));

const DEFAULT={
  weekDate:'08/04/2026',
  fin:{a:'',t:'',ly:'',pipe:'',commit:''},
  deals:[
    {name:'Humain',owner:'Nour',value:'',stage:'Prospecting',status:'In Progress',update:''},
    {name:'Kuwait \u2013 Erth',owner:'Zayed',value:'',stage:'Prospecting',status:'In Progress',update:''},
    {name:'Ministry of Tourism \u2013 KSA',owner:'TBC',value:'',stage:'Prospecting',status:'In Progress',update:''},
    {name:'MOFA \u2013 UAE',owner:'TBC',value:'',stage:'Prospecting',status:'In Progress',update:''},
    {name:'',owner:'',value:'',stage:'Prospecting',status:'In Progress',update:''},
  ],
  np:mkArr(5,{name:'',owner:'',value:'',scope:''}),
  sns:mkArr(3,{step:'',owner:'',due:'',status:'In Progress'}),
  mkt:'',mns:mkArr(3,{action:'',owner:'',due:'',status:'In Progress'}),
  gov:{product:'',marketing:'',sales:'',target:'',status:'In Progress',owner:''},
  bnk:{product:'',marketing:'',sales:'',target:'',status:'In Progress',owner:''},
  cst:{product:'',commercial:'',marketing:'',target:'',status:'In Progress',owner:'Eyad Karadsheh'},
  trl:{product:'',marketing:'',commercial:'',target:'',status:'In Progress',owner:''},
  cdl:mkArr(3,{name:'',value:'',stage:'Prospecting',status:'In Progress'}),
  cpj:mkArr(5,{name:'',update:'',status:'In Progress'}),
  urd:{pipeline:'',deals:''},scr:'',ops:'',
};

/* ── Shared UI helpers ── */
function F({v,set,edit,ph='',multi=false,max}){
  if(!edit)return <span className={!v?'text-gray-400 italic text-sm':'text-sm'}>{v||ph||'\u2014'}</span>;
  const p={value:v,onChange:e=>set(e.target.value),placeholder:ph,className:iCls};
  if(max)p.maxLength=max;
  return multi?<textarea {...p} rows={2} className={iCls+' resize-none'}/>:<input {...p}/>;
}
function Bdg({v,set,edit}){
  if(!edit)return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${sc(v)}`}>{v||'\u2014'}</span>;
  return <select value={v} onChange={e=>set(e.target.value)} className="text-xs border rounded px-1 py-0.5">{STATUSES.map(s=><option key={s}>{s}</option>)}</select>;
}
function Stg({v,set,edit}){
  if(!edit)return <span className="text-sm text-gray-600">{v}</span>;
  return <select value={v} onChange={e=>set(e.target.value)} className="text-xs border rounded px-1 py-0.5">{STAGES.map(s=><option key={s}>{s}</option>)}</select>;
}
function Sec({title,owner,edit,onEdit,onSave,lu,children,borderLeft}){
  return(
    <div className={`bg-white rounded-xl shadow-sm mb-5 overflow-hidden ${borderLeft?'border-l-4 border-amber-400 border border-gray-200':'border border-gray-200'}`}>
      <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
        <div>
          <h2 className="font-bold text-xs uppercase tracking-widest" style={{color:PRP}}>{title}</h2>
          {owner&&<p className="text-xs text-gray-400 mt-0.5">Owner: {owner}</p>}
        </div>
        <div className="flex items-center gap-2 no-print">
          {lu&&<span className="text-xs text-gray-400">{lu}</span>}
          {edit
            ?<button onClick={onSave} className="text-xs text-white px-3 py-1 rounded-full" style={{background:PRP}}>Save</button>
            :<button onClick={onEdit} className="text-xs px-3 py-1 rounded-full border" style={{color:PRP,borderColor:'#d8b4fe'}}>Edit</button>
          }
        </div>
      </div>
      <div className="p-5">{children}</div>
    </div>
  );
}
function KPI({label,actual,target,ly,edit,sA,sT,sL}){
  const pct=(a,b)=>a&&b&&!isNaN(a)&&!isNaN(b)?Math.round(((+a-+b)/+b)*100):null;
  const pvt=pct(actual,target),pvly=pct(actual,ly);
  return(
    <div className="flex-1 border border-gray-100 rounded-lg p-4 min-w-0">
      <p className="text-xs text-gray-500 uppercase tracking-wide mb-2">{label}</p>
      {edit?(
        <div className="space-y-1">
          <input value={actual} onChange={e=>sA(e.target.value)} placeholder="Actual ($)" className={iCls}/>
          <input value={target} onChange={e=>sT(e.target.value)} placeholder="Target ($)" className={iCls}/>
          <input value={ly} onChange={e=>sL(e.target.value)} placeholder="Last Year ($)" className={iCls}/>
        </div>
      ):(
        <>
          <p className="text-2xl font-bold text-black mb-1">{actual?`$${(+actual).toLocaleString()}`:'—'}</p>
          <div className="flex gap-3 flex-wrap">
            {pvt!==null&&<span className={`text-xs font-medium ${pvt>=0?'text-green-600':'text-red-500'}`}>{pvt>=0?'+':''}{pvt}% vs Target</span>}
            {pvly!==null&&<span className={`text-xs font-medium ${pvly>=0?'text-green-600':'text-red-500'}`}>{pvly>=0?'+':''}{pvly}% vs LY</span>}
          </div>
          {target&&<p className="text-xs text-gray-400 mt-1">Target: ${(+target).toLocaleString()}</p>}
        </>
      )}
    </div>
  );
}

const th="text-xs font-semibold text-gray-500 uppercase tracking-wide text-left py-2 pr-3 whitespace-nowrap";
const td="py-2 pr-3 text-sm align-top";

/* ── Login Screen ── */
function LoginScreen({onLogin}){
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [shake,setShake]=useState(false);

  const attempt=()=>{
    if(user.trim()==='LTmember'&&pass==='LTmember321+'){
      sessionStorage.setItem('arabicai_auth','1');
      onLogin();
    } else {
      setErr('Incorrect username or password.');
      setShake(true);setTimeout(()=>setShake(false),500);
    }
  };
  const onKey=e=>e.key==='Enter'&&attempt();

  return(
    <div className="min-h-screen bg-white flex items-center justify-center p-6">
      <div className="max-w-sm w-full">
        <div className="text-center mb-8">
          <h1 className="font-black text-3xl tracking-tight mb-1" style={{color:PRP}}>Arabic.ai</h1>
          <p className="text-sm text-gray-400">Leadership Dashboard</p>
        </div>
        <div className={`border border-gray-200 rounded-2xl p-7 shadow-sm ${shake?'border-red-300':''}`} style={{transition:'border-color 0.2s'}}>
          <h2 className="font-bold text-base mb-5 text-gray-800">Sign in</h2>
          <div className="space-y-4">
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1.5">Username</label>
              <input value={user} onChange={e=>{setUser(e.target.value);setErr('');}} onKeyDown={onKey} placeholder="Enter username" autoFocus
                className="border border-gray-200 rounded-lg px-3 py-2.5 text-sm w-full focus:outline-none focus:ring-2 focus:border-transparent" style={{'--tw-ring-color':PRP}}
              />
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1.5">Password</label>
              <div className="relative">
                <input type={showPw?'text':'password'} value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} onKeyDown={onKey} placeholder="Enter password"
                  className="border border-gray-200 rounded-lg px-3 py-2.5 text-sm w-full focus:outline-none focus:ring-2 focus:border-transparent pr-16"
                />
                <button onClick={()=>setShowPw(s=>!s)} className="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium" style={{color:PRP}}>
                  {showPw?'Hide':'Show'}
                </button>
              </div>
            </div>
            {err&&<p className="text-xs text-red-500 font-medium">{err}</p>}
            <button onClick={attempt} className="w-full py-2.5 rounded-lg text-white font-semibold text-sm mt-1 hover:opacity-90 transition-opacity" style={{background:PRP}}>
              Sign in
            </button>
          </div>
        </div>
        <p className="text-center text-xs text-gray-400 mt-6">Arabic.ai · Internal Use Only · Session expires on tab close</p>
      </div>
    </div>
  );
}

/* ── Setup Screen ── */
function SetupScreen({onConnect,onSkip}){
  const [apiKey,setApiKey]=useState('');
  const [dbUrl,setDbUrl]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const connect=async()=>{
    if(!apiKey.trim()||!dbUrl.trim()){setErr('Please fill in both fields.');return;}
    setLoading(true);setErr('');
    try{
      let app;
      try{app=firebase.app('arabicai_test');}
      catch{app=firebase.initializeApp({apiKey:apiKey.trim(),databaseURL:dbUrl.trim()},'arabicai_test');}
      const db=firebase.database(app);
      await db.ref('_test').set({t:Date.now()});
      await db.ref('_test').remove();
      onConnect({apiKey:apiKey.trim(),databaseURL:dbUrl.trim()});
    }catch(e){
      setErr('Connection failed. Double-check your API Key and Database URL.');
      setLoading(false);
    }
  };

  return(
    <div className="min-h-screen bg-white flex items-center justify-center p-6">
      <div className="max-w-lg w-full">
        <h1 className="font-black text-2xl mb-1" style={{color:PRP}}>Arabic.ai</h1>
        <p className="text-sm text-gray-500 mb-8">Leadership Dashboard — One-time Setup</p>

        <div className="border border-gray-200 rounded-xl p-6 mb-4">
          <h2 className="font-bold text-sm mb-1">Connect Firebase for real-time multi-user sync</h2>
          <p className="text-xs text-gray-500 mb-5">All team members will see updates instantly. Free Firebase tier is more than enough.</p>

          <div className="bg-purple-50 border border-purple-100 rounded-lg p-4 mb-5 space-y-2">
            <p className="text-xs font-bold text-purple-800 mb-1">How to get your credentials (5 min):</p>
            <p className="text-xs text-gray-700">1. Go to <a href="https://console.firebase.google.com" target="_blank" className="text-purple-700 underline font-medium">console.firebase.google.com</a> → <strong>Add project</strong> → skip Analytics → Create</p>
            <p className="text-xs text-gray-700">2. Left menu: <strong>Build → Realtime Database → Create database → Start in test mode → Enable</strong></p>
            <p className="text-xs text-gray-700">3. Copy the <strong>Database URL</strong> shown at the top (e.g. <code className="bg-white px-1 rounded">https://your-project-rtdb.firebaseio.com</code>)</p>
            <p className="text-xs text-gray-700">4. Go to <strong>Project Settings</strong> (gear icon top-left) → <strong>Your apps → Add app → Web (&lt;/&gt;)</strong> → Register → copy <code className="bg-white px-1 rounded">apiKey</code> from the config block</p>
          </div>

          <div className="space-y-3">
            <div>
              <label className="text-xs font-medium text-gray-600 block mb-1">Firebase API Key</label>
              <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AIzaSy..." className={iCls}/>
            </div>
            <div>
              <label className="text-xs font-medium text-gray-600 block mb-1">Firebase Realtime Database URL</label>
              <input value={dbUrl} onChange={e=>setDbUrl(e.target.value)} placeholder="https://your-project-default-rtdb.firebaseio.com" className={iCls}/>
            </div>
            {err&&<p className="text-xs text-red-500 font-medium">{err}</p>}
            <button onClick={connect} disabled={loading} className="w-full py-2.5 rounded-lg text-white font-semibold text-sm disabled:opacity-60" style={{background:PRP}}>
              {loading?'Testing connection…':'Connect & Launch Dashboard'}
            </button>
          </div>
        </div>

        <div className="text-center">
          <button onClick={onSkip} className="text-xs text-gray-400 underline hover:text-gray-600">
            Skip — use this device only (no sync)
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({db,onDisconnect}){
  const [S,setS]=useState(()=>{
    try{const s=localStorage.getItem('arabicai_v1');return s?JSON.parse(s):DEFAULT;}
    catch{return DEFAULT;}
  });
  const [ed,setEd]=useState({});
  const [lu,setLu]=useState({});
  const [meetingMode,setMeetingMode]=useState(false);
  const [editDate,setEditDate]=useState(false);
  const [sync,setSync]=useState(db?'connecting':'offline');
  const edRef=useRef({});
  useEffect(()=>{edRef.current=ed;},[ed]);

  /* Firebase listener */
  useEffect(()=>{
    if(!db)return;
    const ref=db.ref('arabicai_dashboard');
    ref.on('value',(snap)=>{
      const data=snap.val();
      if(data){
        setS(prev=>{
          const next={...prev};
          Object.keys(data).forEach(k=>{if(!edRef.current[k])next[k]=data[k];});
          return next;
        });
        localStorage.setItem('arabicai_v1',JSON.stringify(data));
      }
      setSync('live');
    },()=>setSync('error'));
    return()=>ref.off();
  },[db]);

  const persist=(state)=>{
    localStorage.setItem('arabicai_v1',JSON.stringify(state));
    if(!db)return;
    setSync('saving');
    db.ref('arabicai_dashboard').set(state)
      .then(()=>setSync('live'))
      .catch(()=>setSync('error'));
  };

  const upd=(path,val)=>setS(prev=>{
    const next=JSON.parse(JSON.stringify(prev));
    const parts=path.split('.');let obj=next;
    for(let i=0;i<parts.length-1;i++)obj=obj[parts[i]];
    obj[parts[parts.length-1]]=val;return next;
  });
  const updArr=(arr,i,k,val)=>setS(prev=>{
    const next=JSON.parse(JSON.stringify(prev));next[arr][i][k]=val;return next;
  });
  const toggleEdit=k=>setEd(p=>({...p,[k]:true}));
  const saveEdit=k=>{
    setEd(p=>({...p,[k]:false}));
    setLu(p=>({...p,[k]:ts()}));
    setS(cur=>{persist(cur);return cur;});
  };

  const syncPill=sync==='live'
    ?<span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-medium">● Live</span>
    :sync==='saving'
    ?<span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-medium">⟳ Saving</span>
    :sync==='connecting'
    ?<span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-medium">Connecting…</span>
    :sync==='offline'
    ?<span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-medium">○ Local only</span>
    :<span className="text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-600 font-medium">⚠ Sync error</span>;

  const {fin,deals,np,sns,mkt,mns,gov,bnk,cst,trl,cdl,cpj,urd,scr,ops,weekDate}=S;

  const streams=[
    {key:'gov',title:'Government Stream',desc:'Large government projects — LLM on-prem, Agentic Platform, FDEs. Outreach-driven. Product building agentic platform templates.',state:gov,
      fields:[{k:'product',label:'Product Update',ph:'Agentic platform template progress...'},{k:'marketing',label:'Marketing Update',ph:'Outreach campaigns, content...'},{k:'sales',label:'Sales Update',ph:'Active conversations, intros...'}]},
    {key:'bnk',title:'Banking Stream',desc:'B2C and SME loan eligibility agents. Rakan owns development. Zayed to intro 2 banks. Outreach ongoing.',state:bnk,
      fields:[{k:'product',label:'Product Update',ph:'SME loan eligibility agent (Rakan)...'},{k:'marketing',label:'Marketing Update',ph:'Banking outreach...'},{k:'sales',label:'Sales Update',ph:'Bank intros (Zayed), active deals...'}]},
    {key:'cst',title:'Custom Stream',desc:'Custom AI builds for enterprise clients. Owned by Eyad Karadsheh.',state:cst,
      fields:[{k:'product',label:'Product Update',ph:'Build status, milestones...'},{k:'commercial',label:'Commercial Assets',ph:'Proposals, decks, demos...'},{k:'marketing',label:'Marketing Update',ph:'Support materials, positioning...'}]},
    {key:'trl',title:'Translate Agent',desc:'Deep Translate Agent — AI-powered global translation. Tech team building. Requires commercial and marketing readiness.',state:trl,
      fields:[{k:'product',label:'Product / Tech',ph:'Build progress...'},{k:'marketing',label:'Marketing',ph:'GTM readiness, content...'},{k:'commercial',label:'Commercial',ph:'Pipeline, partnerships...'}]},
  ];

  return(
    <div className="min-h-screen bg-white" style={{fontFamily:'system-ui,sans-serif',fontSize:meetingMode?'15px':'13px'}}>
      {/* Header */}
      <div className="border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 bg-white z-20 shadow-sm">
        <div>
          <div className="flex items-center gap-2">
            <h1 className="font-black text-lg tracking-tight" style={{color:PRP}}>Arabic.ai</h1>
            <span className="text-gray-200">|</span>
            <span className="text-xs font-semibold text-gray-400 uppercase tracking-widest">Leadership Dashboard</span>
          </div>
          <div className="flex items-center gap-2 mt-0.5">
            <span className="text-xs text-gray-400">Week of</span>
            {editDate
              ?<input value={weekDate} onChange={e=>upd('weekDate',e.target.value)} onBlur={()=>setEditDate(false)} className="text-xs border rounded px-1 py-0.5 w-24" autoFocus/>
              :<button onClick={()=>setEditDate(true)} className="text-xs font-medium underline decoration-dotted" style={{color:PRP}}>{weekDate}</button>
            }
            <span className="no-print">{syncPill}</span>
          </div>
        </div>
        <div className="flex items-center gap-2 no-print">
          <button onClick={()=>setMeetingMode(m=>!m)} className="text-xs px-3 py-1.5 rounded-full border transition-all" style={meetingMode?{background:PRP,color:'#fff',borderColor:PRP}:{color:PRP,borderColor:'#d8b4fe'}}>
            {meetingMode?'Exit Meeting Mode':'Meeting Mode'}
          </button>
          <button onClick={()=>window.print()} className="text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-50">Print</button>
          <button onClick={()=>{if(window.confirm('Reset ALL dashboard data?')){const d=DEFAULT;setS(d);persist(d);}}} className="text-xs px-3 py-1.5 rounded-full border border-red-100 text-red-400 hover:bg-red-50">Reset</button>
          <button onClick={onDisconnect} className="text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-400 hover:bg-gray-50">⚙ Reconnect</button>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 py-6">

        {/* FINANCE */}
        <Sec title="Finance" owner="CFO" edit={ed.fin} onEdit={()=>toggleEdit('fin')} onSave={()=>saveEdit('fin')} lu={lu.fin}>
          <div className="flex gap-3 flex-wrap">
            <KPI label="Revenue YTD" actual={fin.a} target={fin.t} ly={fin.ly} edit={ed.fin} sA={v=>upd('fin.a',v)} sT={v=>upd('fin.t',v)} sL={v=>upd('fin.ly',v)}/>
            <div className="flex-1 border border-gray-100 rounded-lg p-4 min-w-0">
              <p className="text-xs text-gray-500 uppercase tracking-wide mb-2">Total Pipeline</p>
              {ed.fin?<input value={fin.pipe} onChange={e=>upd('fin.pipe',e.target.value)} placeholder="Pipeline ($)" className={iCls}/>
                :<p className="text-2xl font-bold">{fin.pipe?`$${(+fin.pipe).toLocaleString()}`:'—'}</p>}
            </div>
            <div className="flex-1 border border-gray-100 rounded-lg p-4 min-w-0">
              <p className="text-xs text-gray-500 uppercase tracking-wide mb-2">Committed to Close — This Month</p>
              {ed.fin?<input value={fin.commit} onChange={e=>upd('fin.commit',e.target.value)} placeholder="Committed ($)" className={iCls}/>
                :<p className="text-2xl font-bold">{fin.commit?`$${(+fin.commit).toLocaleString()}`:'—'}</p>}
            </div>
          </div>
        </Sec>

        {/* SALES */}
        <Sec title="Sales" owner="VP Sales" edit={ed.sales} onEdit={()=>toggleEdit('sales')} onSave={()=>saveEdit('sales')} lu={lu.sales}>
          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>Top 5 Deals in Pipeline</p>
          <div className="overflow-x-auto mb-6">
            <table className="w-full">
              <thead><tr>{['Deal','Owner','Value ($)','Stage','Status','Update'].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
              <tbody>{deals.map((d,i)=>(
                <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                  <td className={td}><F v={d.name} set={v=>updArr('deals',i,'name',v)} edit={ed.sales} ph="Deal name"/></td>
                  <td className={td}><F v={d.owner} set={v=>updArr('deals',i,'owner',v)} edit={ed.sales} ph="Owner"/></td>
                  <td className={td}><F v={d.value} set={v=>updArr('deals',i,'value',v)} edit={ed.sales} ph="0"/></td>
                  <td className={td}><Stg v={d.stage} set={v=>updArr('deals',i,'stage',v)} edit={ed.sales}/></td>
                  <td className={td}><Bdg v={d.status} set={v=>updArr('deals',i,'status',v)} edit={ed.sales}/></td>
                  <td className={td+" min-w-40"}><F v={d.update} set={v=>updArr('deals',i,'update',v)} edit={ed.sales} ph="1-liner..."/></td>
                </tr>
              ))}</tbody>
            </table>
          </div>

          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>New Additions to Pipeline</p>
          <div className="overflow-x-auto mb-6">
            <table className="w-full">
              <thead><tr>{['Company / Deal','Owner','Value ($)','Scope (\u22648 words)'].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
              <tbody>{np.map((r,i)=>(
                <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                  <td className={td}><F v={r.name} set={v=>updArr('np',i,'name',v)} edit={ed.sales} ph="Company"/></td>
                  <td className={td}><F v={r.owner} set={v=>updArr('np',i,'owner',v)} edit={ed.sales} ph="Owner"/></td>
                  <td className={td}><F v={r.value} set={v=>updArr('np',i,'value',v)} edit={ed.sales} ph="0"/></td>
                  <td className={td+" min-w-48"}><F v={r.scope} set={v=>updArr('np',i,'scope',v)} edit={ed.sales} ph="Brief scope..." max={60}/></td>
                </tr>
              ))}</tbody>
            </table>
          </div>

          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>Next Steps from Last Meeting</p>
          <table className="w-full">
            <thead><tr>{['Action','Owner','Due','Status'].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
            <tbody>{sns.map((r,i)=>(
              <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                <td className={td+" w-1/2"}><F v={r.step} set={v=>updArr('sns',i,'step',v)} edit={ed.sales} ph="Next step..."/></td>
                <td className={td}><F v={r.owner} set={v=>updArr('sns',i,'owner',v)} edit={ed.sales} ph="Owner"/></td>
                <td className={td}><F v={r.due} set={v=>updArr('sns',i,'due',v)} edit={ed.sales} ph="DD/MM/YYYY"/></td>
                <td className={td}><Bdg v={r.status} set={v=>updArr('sns',i,'status',v)} edit={ed.sales}/></td>
              </tr>
            ))}</tbody>
          </table>
        </Sec>

        {/* MARKETING */}
        <Sec title="Marketing" owner="VP Marketing" edit={ed.mkt} onEdit={()=>toggleEdit('mkt')} onSave={()=>saveEdit('mkt')} lu={lu.mkt}>
          <p className="font-semibold text-xs uppercase tracking-wide mb-2" style={{color:PRP}}>Overall Update</p>
          <div className="mb-5"><F v={mkt} set={v=>upd('mkt',v)} edit={ed.mkt} ph="Marketing update for this week..." multi={true}/></div>
          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>Next Steps from Last Meeting</p>
          <table className="w-full">
            <thead><tr>{['Action','Owner','Due','Status'].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
            <tbody>{mns.map((r,i)=>(
              <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                <td className={td+" w-1/2"}><F v={r.action} set={v=>updArr('mns',i,'action',v)} edit={ed.mkt} ph="Action item..."/></td>
                <td className={td}><F v={r.owner} set={v=>updArr('mns',i,'owner',v)} edit={ed.mkt} ph="Owner"/></td>
                <td className={td}><F v={r.due} set={v=>updArr('mns',i,'due',v)} edit={ed.mkt} ph="DD/MM/YYYY"/></td>
                <td className={td}><Bdg v={r.status} set={v=>updArr('mns',i,'status',v)} edit={ed.mkt}/></td>
              </tr>
            ))}</tbody>
          </table>
        </Sec>

        {/* CORE STREAMS */}
        <div className="pt-2 pb-1">
          <h2 className="font-bold text-xs uppercase tracking-widest" style={{color:PRP}}>Core Streams</h2>
          <div className="h-px bg-purple-100 mt-2 mb-4"/>
        </div>

        {streams.map(({key,title,desc,state,fields})=>(
          <Sec key={key} title={title} owner={state.owner||'—'} edit={ed[key]} onEdit={()=>toggleEdit(key)} onSave={()=>saveEdit(key)} lu={lu[key]}>
            <p className="text-xs text-gray-500 italic mb-3">{desc}</p>
            <div className="flex flex-wrap gap-4 mb-4">
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500 font-medium">Status:</span>
                <Bdg v={state.status} set={v=>upd(`${key}.status`,v)} edit={ed[key]}/>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500 font-medium">Target:</span>
                {ed[key]?<input value={state.target} onChange={e=>upd(`${key}.target`,e.target.value)} placeholder="e.g. $500k Q2" className="border rounded px-2 py-0.5 text-xs w-32 focus:outline-none focus:ring-1 focus:ring-purple-600"/>
                  :<span className="text-xs font-semibold text-gray-700">{state.target||'—'}</span>}
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500 font-medium">Stream Lead:</span>
                {ed[key]?<input value={state.owner} onChange={e=>upd(`${key}.owner`,e.target.value)} placeholder="Name" className="border rounded px-2 py-0.5 text-xs w-32 focus:outline-none focus:ring-1 focus:ring-purple-600"/>
                  :<span className="text-xs font-semibold text-gray-700">{state.owner||'—'}</span>}
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {fields.map(({k,label,ph})=>(
                <div key={k} className="bg-gray-50 rounded-lg p-3 border border-gray-100">
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">{label}</p>
                  <F v={state[k]} set={v=>upd(`${key}.${k}`,v)} edit={ed[key]} ph={ph} multi={true}/>
                </div>
              ))}
            </div>
          </Sec>
        ))}

        {/* OTHER BIZ UNITS */}
        <div className="pt-2 pb-1">
          <h2 className="font-bold text-xs uppercase tracking-widest" style={{color:PRP}}>Other Business Units</h2>
          <div className="h-px bg-purple-100 mt-2 mb-4"/>
        </div>

        {/* CONTENT LAB */}
        <Sec title="Content Lab" owner="MD Content Lab" edit={ed.clab} onEdit={()=>toggleEdit('clab')} onSave={()=>saveEdit('clab')} lu={lu.clab}>
          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>Deals in Pipeline</p>
          <div className="overflow-x-auto mb-6">
            <table className="w-full">
              <thead><tr>{['Client / Deal','Value ($)','Stage','Status'].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
              <tbody>{cdl.map((r,i)=>(
                <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                  <td className={td}><F v={r.name} set={v=>updArr('cdl',i,'name',v)} edit={ed.clab} ph="Client name"/></td>
                  <td className={td}><F v={r.value} set={v=>updArr('cdl',i,'value',v)} edit={ed.clab} ph="0"/></td>
                  <td className={td}><Stg v={r.stage} set={v=>updArr('cdl',i,'stage',v)} edit={ed.clab}/></td>
                  <td className={td}><Bdg v={r.status} set={v=>updArr('cdl',i,'status',v)} edit={ed.clab}/></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <p className="font-semibold text-xs uppercase tracking-wide mb-3" style={{color:PRP}}>Largest 5 Projects</p>
          <table className="w-full">
            <thead><tr>{['Project','Status Update',''].map(h=><th key={h} className={th}>{h}</th>)}</tr></thead>
            <tbody>{cpj.map((r,i)=>(
              <tr key={i} className={i%2===0?'':'bg-gray-50'}>
                <td className={td+" w-1/3"}><F v={r.name} set={v=>updArr('cpj',i,'name',v)} edit={ed.clab} ph="Project name"/></td>
                <td className={td+" w-1/2"}><F v={r.update} set={v=>updArr('cpj',i,'update',v)} edit={ed.clab} ph="1-liner status..."/></td>
                <td className={td}><Bdg v={r.status} set={v=>updArr('cpj',i,'status',v)} edit={ed.clab}/></td>
              </tr>
            ))}</tbody>
          </table>
        </Sec>

        {/* UREED */}
        <Sec title="Ureed" owner="MD Ureed" edit={ed.urd} onEdit={()=>toggleEdit('urd')} onSave={()=>saveEdit('urd')} lu={lu.urd}>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Pipeline Update</p>
              <F v={urd.pipeline} set={v=>upd('urd.pipeline',v)} edit={ed.urd} ph="Pipeline status, volume, key deals..." multi={true}/>
            </div>
            <div>
              <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Potential Deals Highlight</p>
              <F v={urd.deals} set={v=>upd('urd.deals',v)} edit={ed.urd} ph="Key opportunities, sizes, timelines..." multi={true}/>
            </div>
          </div>
        </Sec>

        {/* SCREENS */}
        <Sec title="Screens / PMI" owner="COO" edit={ed.scr} onEdit={()=>toggleEdit('scr')} onSave={()=>saveEdit('scr')} lu={lu.scr}>
          <F v={scr} set={v=>upd('scr',v)} edit={ed.scr} ph="Post-merger integration update — milestones, blockers, next steps..." multi={true}/>
        </Sec>

        {/* OPS */}
        <Sec title="Operations" owner="COO" edit={ed.ops} onEdit={()=>toggleEdit('ops')} onSave={()=>saveEdit('ops')} lu={lu.ops} borderLeft={!!ops}>
          {ed.ops
            ?<textarea value={ops} onChange={e=>upd('ops',e.target.value)} placeholder="Flag any execution issues, delays, or blockers..." rows={3} className={iCls+' resize-none'}/>
            :<p className={ops?'text-sm':'text-sm text-gray-400 italic'}>{ops||'No issues flagged.'}</p>
          }
        </Sec>

        <p className="text-center text-xs text-gray-400 pb-8 pt-2">Arabic.ai · Confidential · Internal Use Only</p>
      </div>
    </div>
  );
}

/* ── App root ── */
function App(){
  const [loggedIn,setLoggedIn]=useState(()=>sessionStorage.getItem('arabicai_auth')==='1');
  const [config,setConfig]=useState(()=>{
    try{const c=localStorage.getItem('arabicai_firebase_cfg');return c?JSON.parse(c):null;}
    catch{return null;}
  });
  const [offline,setOffline]=useState(false);

  if(!loggedIn) return <LoginScreen onLogin={()=>setLoggedIn(true)}/>;
  const [db,setDb]=useState(null);

  useEffect(()=>{
    if(!config)return;
    try{
      let app;
      try{app=firebase.app('arabicai');}
      catch{app=firebase.initializeApp(config,'arabicai');}
      setDb(firebase.database(app));
    }catch(e){console.error('Firebase init error',e);}
  },[config]);

  const handleConnect=(cfg)=>{
    localStorage.setItem('arabicai_firebase_cfg',JSON.stringify(cfg));
    setConfig(cfg);setOffline(false);
  };

  const handleDisconnect=()=>{
    localStorage.removeItem('arabicai_firebase_cfg');
    setConfig(null);setDb(null);setOffline(false);
  };

  if(!config&&!offline)return <SetupScreen onConnect={handleConnect} onSkip={()=>setOffline(true)}/>;
  return <Dashboard db={db} onDisconnect={handleDisconnect}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
